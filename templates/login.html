{% extends "base.html" %}
{% block title %}Login — RetailIQ{% endblock %}

{% block content %}
<div class="auth-wrap fade-up">
    <div class="auth-card">
        <div class="auth-logo">🛒 RetailIQ</div>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-sub">Sign in to access your analytics</p>

        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login" class="auth-form" id="loginForm">
            <div class="field-group">
                <label>Username</label>
                <input type="text" name="username" id="username" placeholder="Enter username" autocomplete="off" required />
            </div>
            <div class="field-group">
                <label>Password</label>
                <div class="input-wrap">
                    <input type="password" name="password" id="password" placeholder="Enter password" required />
                    <button type="button" class="toggle-pw" onclick="togglePw('password', this)">👁</button>
                </div>
            </div>
            <button type="submit" class="auth-btn">Sign In →</button>
        </form>

        <p class="auth-switch">New here? <a href="/signup">Create an account</a></p>
    </div>
</div>

<style>
.auth-wrap {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
}
.auth-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 3rem;
    width: 100%;
    max-width: 420px;
    backdrop-filter: blur(20px);
    box-shadow: 0 40px 80px rgba(0,0,0,0.4);
}
.auth-logo {
    font-size: 1.3rem;
    font-weight: 700;
    color: #00f5d4;
    margin-bottom: 1.5rem;
}
.auth-title {
    font-size: 2rem;
    font-weight: 800;
    color: #fff;
    margin: 0 0 0.4rem;
}
.auth-sub {
    color: rgba(255,255,255,0.4);
    margin: 0 0 2rem;
    font-size: 0.95rem;
}
.auth-error {
    background: rgba(241,91,181,0.15);
    border: 1px solid rgba(241,91,181,0.3);
    color: #f15bb5;
    padding: 0.75rem 1rem;
    border-radius: 10px;
    margin-bottom: 1.5rem;
    font-size: 0.9rem;
}
.auth-form {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
}
.field-group {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
}
.field-group label {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.5);
}
.input-wrap {
    position: relative;
}
.field-group input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 0.85rem 1rem;
    color: #fff;
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
}
.field-group input:focus {
    border-color: #00f5d4;
}
.field-group input::placeholder { color: rgba(255,255,255,0.2); }
.toggle-pw {
    position: absolute;
    right: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    opacity: 0.5;
}
.toggle-pw:hover { opacity: 1; }
.auth-btn {
    margin-top: 0.5rem;
    background: linear-gradient(135deg, #00f5d4, #9b5de5);
    border: none;
    border-radius: 10px;
    padding: 0.9rem;
    color: #0a0a0f;
    font-weight: 700;
    font-size: 1rem;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
}
.auth-btn:hover { opacity: 0.9; transform: translateY(-1px); }
.auth-switch {
    margin-top: 1.5rem;
    text-align: center;
    color: rgba(255,255,255,0.4);
    font-size: 0.9rem;
}
.auth-switch a { color: #00f5d4; text-decoration: none; font-weight: 600; }
.auth-switch a:hover { text-decoration: underline; }
</style>

<script>
function togglePw(id, btn) {
    var inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}
</script>
{% endblock %}
